openapi: 3.0.0
info:
  title: Orders Manager API
  description: API para gerenciamento de pedidos (orders) com seus respectivos itens.
  version: 1.0.0
  contact:
    name: Gustavo

servers:
  - url: http://localhost:3006
    description: Servidor local

tags:
  - name: Orders
    description: Operações relacionadas a pedidos

paths:

  /order/list:
    get:
      tags:
        - Orders
      summary: Listar todos os pedidos
      description: Retorna uma lista com todos os pedidos cadastrados, incluindo seus itens.
      responses:
        '200':
          description: Lista de pedidos retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
              example:
                - orderId: 1
                  value: 150.00
                  creationDate: "2024-01-15T10:30:00.000Z"
                  itens:
                    - productId: 1
                      name: "Produto A"
                      quantity: 2
                      price: 50.00
                    - productId: 2
                      name: "Produto B"
                      quantity: 1
                      price: 50.00
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /order/{id}:
    get:
      tags:
        - Orders
      summary: Buscar pedido por ID
      description: Retorna um pedido específico com base no ID fornecido.
      parameters:
        - name: id
          in: path
          required: true
          description: ID numérico do pedido
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Pedido encontrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                orderId: 1
                value: 150.00
                creationDate: "2024-01-15T10:30:00.000Z"
                itens:
                  - productId: 1
                    name: "Produto A"
                    quantity: 2
                    price: 50.00
        '404':
          description: Pedido não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Order Not Found"

    put:
      tags:
        - Orders
      summary: Atualizar pedido
      description: Atualiza o valor e/ou os itens de um pedido existente. Os itens antigos são substituídos pelos novos.
      parameters:
        - name: id
          in: path
          required: true
          description: ID numérico do pedido a ser atualizado
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
            example:
              value: 200.00
              itens:
                - name: "Produto C"
                  quantity: 3
                  price: 66.67
      responses:
        '200':
          description: Pedido atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Pedido não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: "Order Not Found"

    delete:
      tags:
        - Orders
      summary: Deletar pedido
      description: Remove um pedido e todos os seus itens do banco de dados.
      parameters:
        - name: id
          in: path
          required: true
          description: ID numérico do pedido a ser deletado
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Pedido deletado com sucesso. Retorna os dados do pedido removido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                orderId: 1
                value: 150.00
                creationDate: "2024-01-15T10:30:00.000Z"
                itens:
                  - productId: 1
                    name: "Produto A"
                    quantity: 2
                    price: 50.00
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /order:
    post:
      tags:
        - Orders
      summary: Criar novo pedido
      description: Cria um novo pedido com valor e lista de itens opcionais.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
            example:
              value: 150.00
              itens:
                - name: "Produto A"
                  quantity: 2
                  price: 50.00
                - name: "Produto B"
                  quantity: 1
                  price: 50.00
      responses:
        '201':
          description: Pedido criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                orderId: 1
                value: 150.00
                creationDate: "2024-01-15T10:30:00.000Z"
                itens:
                  - name: "Produto A"
                    quantity: 2
                    price: 50.00
                  - name: "Produto B"
                    quantity: 1
                    price: 50.00
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:

    Item:
      type: object
      properties:
        productId:
          type: integer
          description: ID do produto (gerado pelo banco)
          example: 1
        name:
          type: string
          description: Nome do produto
          example: "Produto A"
        quantity:
          type: integer
          description: Quantidade do item no pedido
          example: 2
        price:
          type: number
          format: float
          description: Preço unitário do item
          example: 50.00

    ItemInput:
      type: object
      required:
        - name
        - quantity
        - price
      properties:
        name:
          type: string
          description: Nome do produto
          example: "Produto A"
        quantity:
          type: integer
          description: Quantidade do item
          example: 2
        price:
          type: number
          format: float
          description: Preço unitário do item
          example: 50.00

    Order:
      type: object
      properties:
        orderId:
          type: integer
          description: ID único do pedido
          example: 1
        value:
          type: number
          format: float
          description: Valor total do pedido
          example: 150.00
        creationDate:
          type: string
          format: date-time
          description: Data de criação do pedido
          example: "2024-01-15T10:30:00.000Z"
        itens:
          type: array
          description: Lista de itens do pedido
          items:
            $ref: '#/components/schemas/Item'

    OrderInput:
      type: object
      required:
        - value
      properties:
        value:
          type: number
          format: float
          description: Valor total do pedido
          example: 150.00
        itens:
          type: array
          description: Lista de itens do pedido (opcional)
          items:
            $ref: '#/components/schemas/ItemInput'

    Error:
      type: object
      properties:
        message:
          type: string
          description: Descrição do erro
          example: "Order Not Found"
